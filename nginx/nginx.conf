# ─────────────────────────────────────────────────────────────────────────────
# NGINX — Production reverse proxy config for Task Manager API
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ── Rate Limiting ──────────────────────────────────────────────────────
    # 30 requests/minute per IP — burst of 10 queued, no delay
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_status 429;

    # ── Log Format ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" '
                    'rt=$request_time '
                    'upstream_rt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 4;
    gzip_types      application/json text/plain text/html
                    application/javascript text/css
                    application/xml text/xml;
    gzip_min_length 1000;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    client_max_body_size 1m;   # Reject oversized payloads
    server_tokens      off;    # Hide nginx version in headers and error pages

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (ready for when a domain is added)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS Certificate ───────────────────────────────────────────────
        # Self-signed (generated by nginx/generate-ssl.sh).
        # To migrate to Let's Encrypt, see: docs/ssl-upgrade.md
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ── TLS Hardening ─────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;
        ssl_session_tickets       off;    # Disable for forward secrecy

        # ── Security Headers ──────────────────────────────────────────────
        add_header X-Frame-Options              "DENY"                              always;
        add_header X-Content-Type-Options       "nosniff"                           always;
        add_header X-XSS-Protection             "1; mode=block"                     always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy           "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; font-src 'self' https://cdn.jsdelivr.net;" always;

        # ── Health check — no rate limit, no access log ───────────────────
        location = /health {
            proxy_pass         http://api:8000/health;
            proxy_set_header   Host $host;
            proxy_read_timeout 5s;
            access_log         off;
        }

        # ── API & Frontend ────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass          http://api:8000;
            proxy_http_version  1.1;

            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection        "";

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;

            # Hide upstream server identity
            proxy_hide_header   X-Powered-By;
            proxy_hide_header   Server;
        }
    }
}
